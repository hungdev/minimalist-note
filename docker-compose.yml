version: '3'
services:
  web-note:
    build: .
    restart: unless-stopped
    expose:
      - 80
    volumes:
      - notes-data:/var/www/html/_tmp
    environment:
      - SERVICE_FQDN_WEB_NOTE_80
      - FILE_LIMIT=100000
      - SINGLE_FILE_SIZE_LIMIT=102400
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost/ > /dev/null 2>&1 || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  notes-data:
